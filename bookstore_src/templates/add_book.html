{% extends 'base.html' %}

{% block container %}
<main style="padding:40px; max-width:600px; margin:auto; display:block;">

    <h2 style="color:#00b4d8;">Add a New Book</h2>

    <form method="POST">

        <label>Title:</label><br>
        <input type="text" name="title" required style="background-color:#141b2d; color:#e0e0e0; border:1px solid #1e2a45; padding:4px;"><br><br>

        <label>Author:</label><br>
        <input type="text" name="author" required style="background-color:#141b2d; color:#e0e0e0; border:1px solid #1e2a45; padding:4px;"><br><br>

        <label>ISBN:</label><br>
        <input type="text" name="isbn" required style="background-color:#141b2d; color:#e0e0e0; border:1px solid #1e2a45; padding:4px;"><br><br>

        <label>Price:</label><br>
        <input type="number" step="0.01" name="price" required style="background-color:#141b2d; color:#e0e0e0; border:1px solid #1e2a45; padding:4px;"><br><br>

        <label>Image filename:</label><br>
        <input type="text" name="image" placeholder="example.jpg" required style="background-color:#141b2d; color:#e0e0e0; border:1px solid #1e2a45; padding:4px;"><br><br>

        <label>Category:</label><br>
        <select name="categoryId" required style="background-color:#141b2d; color:#e0e0e0; border:1px solid #1e2a45; padding:4px;">
            {% for cat in categories %}
                <option value="{{ cat.categoryId }}">{{ cat.categoryName }}</option>
            {% endfor %}
        </select><br><br>

        <button type="submit" style="background-color:#00b4d8; color:#0a0e17; border:none; border-radius:8px; padding:8px 20px; font-weight:bold; cursor:pointer;">Add Book</button>

    </form>

</main>
{% endblock %}
