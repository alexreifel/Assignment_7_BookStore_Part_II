<!DOCTYPE html>
<html>
  <head>
    <title>Event Horizon Books</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="shortcut icon" href="data:image/x-icon;," type="image/x-icon">
  </head>
  <body>
    <header>
      <div id="leftHeader">
        <a href="{{ url_for('home') }}">
          <span class="siteLogo">EVENT HORIZON <span>BOOKS</span></span>
        </a>
      </div>

      <div id="midHeader">
        <form id="searchBoxForm" action="{{ url_for('search') }}" method="post">
          <input id="searchBox" type="text" placeholder="Book Title Search" name="search">
          <input id="searchIcon" type="image" src="{{ url_for('static', filename='images/misc/search-icon.png') }}" alt="search icon">
        </form>

        <div class="dropdown">
          <p class="dropdownSelect">Select Category</p>
          <div class="dropdownContent">
            {% for category in categories %}
              <p>
                <a href="{{ url_for('category', categoryId=category.categoryId) }}">
                  {{ category.categoryName }}
                </a>
              </p>
            {% endfor %}
          </div>
        </div>
      </div>

      <div id="rightHeader">
        <div id="cartIcon">
          <a href="#">
            <img src="{{ url_for('static', filename='images/misc/cart-icon.jpg') }}" alt="shopping cart icon">
          </a>
        </div>
        <div id="cartCount">0 items</div>
        <div class="readNowButton"><a href="{{ url_for('read_now') }}">Read Now</a></div>
        <div class="loginButton"><a href="#">login</a></div>
        <div class="loginButton">
          <a href="{{ url_for('add_book') }}">Add Book</a>
        </div>
      </div>
    </header>

    <main>{% block container %}{% endblock %}</main>

    <script>
      (function () {
        const STORAGE_KEY = 'ehb_cart';

        function load() {
          try {
            const raw = localStorage.getItem(STORAGE_KEY);
            const arr = raw ? JSON.parse(raw) : [];
            return Array.isArray(arr) ? arr.map(String) : [];
          } catch (e) { return []; }
        }

        function save(ids) {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(ids));
        }

        function updateCount(ids) {
          const el = document.getElementById('cartCount');
          if (!el) return;
          const n = ids.length;
          el.textContent = n + (n === 1 ? ' item' : ' items');
        }

        function paint(btn, inCart) {
          btn.textContent = inCart ? 'Remove from cart' : 'Add to cart';
          btn.classList.toggle('inCart', inCart);
        }

        document.addEventListener('DOMContentLoaded', function () {
          let ids = load();
          updateCount(ids);
          document.querySelectorAll('.cartButton[data-book-id]').forEach(function (btn) {
            const id = btn.getAttribute('data-book-id');
            paint(btn, ids.indexOf(id) !== -1);
            btn.addEventListener('click', function (e) {
              e.preventDefault();
              ids = load();
              const idx = ids.indexOf(id);
              if (idx === -1) ids.push(id);
              else ids.splice(idx, 1);
              save(ids);
              updateCount(ids);
              document
                .querySelectorAll('.cartButton[data-book-id="' + id + '"]')
                .forEach(function (b) { paint(b, ids.indexOf(id) !== -1); });
            });
          });
        });
      })();
    </script>

    <footer>
      <div id="footerLeft">
        <p>Event Horizon Books</p>
        <p>&copy;</p>
        <a href="#">Contact Us</a>
        <a href="#">Directions</a>
      </div>
      <div id="footerRight">
        <a href="#"><img src="{{ url_for('static', filename='images/misc/facebook-icon.jpg') }}" alt="Facebook"></a>
        <a href="#"><img src="{{ url_for('static', filename='images/misc/twitter-icon.jpg') }}" alt="Twitter"></a>
      </div>
    </footer>
  </body>
</html>
