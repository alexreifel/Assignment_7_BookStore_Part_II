<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" width="200" height="140">
  <defs>
    <pattern id="hs-grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1e2a45" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="200" height="140" fill="#0a0e17"/>
  <rect width="200" height="140" fill="url(#hs-grid)"/>
  <g transform="translate(100 70)" fill="none" stroke="#00b4d8" stroke-width="1">
    <ellipse cx="0" cy="0" rx="60" ry="20"/>
    <ellipse cx="0" cy="0" rx="60" ry="20" transform="rotate(60)"/>
    <ellipse cx="0" cy="0" rx="60" ry="20" transform="rotate(-60)"/>
    <circle cx="0" cy="0" r="10" fill="#00b4d8" opacity="0.25" stroke="none"/>
    <circle cx="0" cy="0" r="5" fill="#00b4d8" stroke="none"/>
  </g>
  <g transform="translate(100 70)" fill="#e0e0e0">
    <circle cx="60" cy="0" r="2.5"/>
    <g transform="rotate(60)"><circle cx="60" cy="0" r="2.5"/></g>
    <g transform="rotate(-60)"><circle cx="60" cy="0" r="2.5"/></g>
  </g>
  <g fill="#00b4d8" font-family="Courier, monospace" font-size="6" opacity="0.75">
    <text x="5" y="12">E = mc²</text>
    <text x="5" y="133">Ψ(x,t)</text>
    <text x="152" y="12">∇·E = ρ/ε₀</text>
    <text x="170" y="133">F = ma</text>
  </g>
  <g stroke="#00b4d8" stroke-width="0.6" opacity="0.6">
    <line x1="0" y1="70" x2="8" y2="70"/>
    <line x1="192" y1="70" x2="200" y2="70"/>
    <line x1="100" y1="0" x2="100" y2="8"/>
    <line x1="100" y1="132" x2="100" y2="140"/>
  </g>
</svg>
